};

// GPS分析タブ（サブコンポーネント）
const GpsAnalysisTab = ({ refreshKey }) => {
  const { useState, useEffect, useRef, useCallback } = React;
  const { isLoaded: mapsLoaded } = useGoogleMaps();
  const [subTab, setSubTab] = useState('trend');  // trend | matrix | playback
  const [loading, setLoading] = useState(false);

  // --- 走行トレンド ---
  const [trends, setTrends] = useState([]);
  useEffect(() => {
    if (subTab !== 'trend' || !window.GpsLogService) return;
    let cancelled = false;
    setLoading(true);
    GpsLogService.getAllDailyTrends().then(t => { if (!cancelled) { setTrends(t); setLoading(false); } });
    return () => { cancelled = true; };
  }, [subTab, refreshKey]);

  // --- エリア×時間帯マトリクス ---
  const [matrix, setMatrix] = useState(null);
  const [matrixDays, setMatrixDays] = useState(7);
  useEffect(() => {
    if (subTab !== 'matrix' || !window.GpsLogService) return;
    let cancelled = false;
    setLoading(true);
    GpsLogService.getLogDates().then(async dates => {
      if (cancelled) return;
      const target = dates.slice(0, matrixDays);
      if (target.length === 0) { setMatrix(null); setLoading(false); return; }
      const m = await GpsLogService.getAreaTimeMatrix(target);
      if (!cancelled) { setMatrix(m); setLoading(false); }
    });
    return () => { cancelled = true; };
  }, [subTab, matrixDays, refreshKey]);

  // --- 軌跡プレイバック ---
  const [playDates, setPlayDates] = useState([]);
  const [playDate, setPlayDate] = useState('');
  const [trackData, setTrackData] = useState([]);
  const [playIdx, setPlayIdx] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [playSpeed, setPlaySpeed] = useState(10);
  const playTimerRef = useRef(null);
  const playMapRef = useRef(null);
  const playMapInstanceRef = useRef(null);
  const playPolylineRef = useRef(null);
  const playMarkerRef = useRef(null);
  const playTrailRef = useRef(null);
  const playSegmentsRef = useRef([]);
  const pickupMarkersRef = useRef([]);
  const pickupInfoWindowRef = useRef(null);

  // --- 待機分析 ---
  const [standbyDates, setStandbyDates] = useState([]);
  const [standbyDate, setStandbyDate] = useState('');
  const [standbyPeriods, setStandbyPeriods] = useState([]);
  const [standbyNames, setStandbyNames] = useState({});
  const standbyMapRef = useRef(null);
  const standbyMapInstanceRef = useRef(null);
  const standbyMarkersRef = useRef([]);
  const standbyInfoWindowRef = useRef(null);

  useEffect(() => {
    if (subTab !== 'playback' || !window.GpsLogService) return;
    let cancelled = false;
    GpsLogService.getLogDates().then(dates => {
      if (!cancelled) {
        setPlayDates(dates);
        if (dates.length > 0 && !playDate) setPlayDate(dates[0]);
      }
    });
    return () => { cancelled = true; };
  }, [subTab, refreshKey]);

  useEffect(() => {
    if (!playDate || subTab !== 'playback') return;
    let cancelled = false;
    setLoading(true);
    setPlaying(false);
    if (playTimerRef.current) clearInterval(playTimerRef.current);
    GpsLogService.getTrackData(playDate).then(data => {
      if (!cancelled) { setTrackData(data); setPlayIdx(0); setLoading(false); }
    });
    return () => { cancelled = true; };
  }, [playDate, subTab]);

  // プレイバック地図の初期化
  useEffect(() => {
    if (subTab !== 'playback' || !playMapRef.current || !mapsLoaded || !window.google) return;
    if (playMapInstanceRef.current) return;
    playMapInstanceRef.current = new google.maps.Map(playMapRef.current, {
      center: { lat: 43.77, lng: 142.365 },
      zoom: 13,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: false,
      styles: [{ elementType: 'geometry', stylers: [{ color: '#1d2c4d' }] },
        { elementType: 'labels.text.fill', stylers: [{ color: '#8ec3b9' }] },
        { elementType: 'labels.text.stroke', stylers: [{ color: '#1a3646' }] },
        { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#304a7d' }] },
        { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0e1626' }] }],
    });
  }, [subTab, mapsLoaded]);

  // トラックデータ変更時に地図更新
  useEffect(() => {
    if (!playMapInstanceRef.current || trackData.length === 0) return;
    const map = playMapInstanceRef.current;

    // 既存のオーバーレイをクリア
    if (playPolylineRef.current) playPolylineRef.current.setMap(null);
    if (playMarkerRef.current) playMarkerRef.current.setMap(null);
    if (playTrailRef.current) playTrailRef.current.setMap(null);
    playSegmentsRef.current.forEach(s => s.polyline.setMap(null));
    playSegmentsRef.current = [];
    pickupMarkersRef.current.forEach(m => m.setMap(null));
    pickupMarkersRef.current = [];
    if (pickupInfoWindowRef.current) pickupInfoWindowRef.current.close();

    // 全ルートのポリライン（薄いライン）
    const path = trackData.map(p => ({ lat: p.lat, lng: p.lng }));
    playPolylineRef.current = new google.maps.Polyline({
      path, map, strokeColor: 'rgba(255,255,255,0.15)', strokeWeight: 2,
    });

    // セグメント別ポリライン（実車/空車色分け）
    const segments = [];
    let segStart = 0;
    for (let i = 1; i <= trackData.length; i++) {
      if (i === trackData.length || trackData[i].status !== trackData[segStart].status) {
        const isOccupied = trackData[segStart].status === 'occupied';
        const segPath = trackData.slice(segStart, i + (i < trackData.length ? 1 : 0))
          .map(pt => ({ lat: pt.lat, lng: pt.lng }));
        const polyline = new google.maps.Polyline({
          path: segPath,
          map: null, // 初期は非表示、再生で表示
          strokeColor: isOccupied ? '#00e676' : '#ff9800',
          strokeWeight: isOccupied ? 4 : 3,
          strokeOpacity: 0.9,
        });
        segments.push({ startIdx: segStart, endIdx: i - 1, polyline, status: trackData[segStart].status });
        segStart = i;
      }
    }
    playSegmentsRef.current = segments;

    // playTrailRefは互換性のため残す（非表示）
    playTrailRef.current = null;

    // 乗車地マーカー
    if (playDate && window.DataService) {
      const entries = DataService.getEntries();
      const dayEntries = entries.filter(e => e.date === playDate && e.pickupCoords && e.pickupCoords.lat && e.pickupCoords.lng);
      const iw = new google.maps.InfoWindow();
      pickupInfoWindowRef.current = iw;
      dayEntries.forEach(e => {
        const marker = new google.maps.Marker({
          position: { lat: e.pickupCoords.lat, lng: e.pickupCoords.lng },
          map,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            fillColor: '#ff1744',
            fillOpacity: 0.9,
            strokeColor: '#fff',
            strokeWeight: 1.5,
            scale: 6,
          },
          zIndex: 50,
          title: e.pickup || '乗車地',
        });
        marker.addListener('click', () => {
          const amt = e.amount ? `${Number(e.amount).toLocaleString()}円` : '---';
          const time = e.pickupTime || '---';
          const place = e.pickup || '不明';
          iw.setContent(`<div style="color:#333;font-size:13px;line-height:1.5;min-width:120px"><b>${amt}</b><br>${time} | ${place}</div>`);
          iw.open(map, marker);
        });
        pickupMarkersRef.current.push(marker);
      });
    }

    // 現在位置マーカー
    playMarkerRef.current = new google.maps.Marker({
      position: path[0], map,
      icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: '#00e676', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2, scale: 8 },
      zIndex: 100,
    });

    // 全体が見えるようにフィット
    const bounds = new google.maps.LatLngBounds();
    path.forEach(p => bounds.extend(p));
    map.fitBounds(bounds, 40);
  }, [trackData, playDate]);

  // プレイバック位置更新
  useEffect(() => {
    if (!playMapInstanceRef.current || !playMarkerRef.current || trackData.length === 0) return;
    const idx = Math.min(playIdx, trackData.length - 1);
    const p = trackData[idx];
    const pos = { lat: p.lat, lng: p.lng };
    playMarkerRef.current.setPosition(pos);

    // セグメント別表示更新
    const segments = playSegmentsRef.current;
    for (const seg of segments) {
      if (seg.endIdx < idx) {
        // 完全に通過済み → フル表示（次セグメントとの接続点も含む）
        if (!seg.polyline.getMap()) seg.polyline.setMap(playMapInstanceRef.current);
        const end = Math.min(seg.endIdx + 2, trackData.length);
        const fullPath = trackData.slice(seg.startIdx, end).map(pt => ({ lat: pt.lat, lng: pt.lng }));
        seg.polyline.setPath(fullPath);
      } else if (seg.startIdx <= idx) {
        // 現在位置を含むセグメント → 途中まで表示
        if (!seg.polyline.getMap()) seg.polyline.setMap(playMapInstanceRef.current);
        const partialPath = trackData.slice(seg.startIdx, idx + 1).map(pt => ({ lat: pt.lat, lng: pt.lng }));
        seg.polyline.setPath(partialPath);
      } else {
        // まだ到達していないセグメント → 非表示
        seg.polyline.setMap(null);
      }
    }

    // 現在位置マーカーの色を実車/空車で変える
    playMarkerRef.current.setIcon({
      path: google.maps.SymbolPath.CIRCLE,
      fillColor: p.status === 'occupied' ? '#00e676' : '#ff9800',
      fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2, scale: 8,
    });
  }, [playIdx, trackData]);

  // 再生タイマー
  useEffect(() => {
    if (playTimerRef.current) clearInterval(playTimerRef.current);
    if (!playing || trackData.length === 0) return;
    playTimerRef.current = setInterval(() => {
      setPlayIdx(prev => {
        if (prev >= trackData.length - 1) { setPlaying(false); return prev; }
        return prev + 1;
      });
    }, 1000 / playSpeed);
    return () => clearInterval(playTimerRef.current);
  }, [playing, playSpeed, trackData.length]);

  // クリーンアップ
  useEffect(() => {
    return () => {
      if (playTimerRef.current) clearInterval(playTimerRef.current);
      playSegmentsRef.current.forEach(s => s.polyline.setMap(null));
      playSegmentsRef.current = [];
      pickupMarkersRef.current.forEach(m => m.setMap(null));
      pickupMarkersRef.current = [];
      if (pickupInfoWindowRef.current) pickupInfoWindowRef.current.close();
    };
  }, []);

  // --- 待機分析: 日付リスト取得 ---
  useEffect(() => {
    if (subTab !== 'standby' || !window.GpsLogService) return;
    let cancelled = false;
    GpsLogService.getLogDates().then(dates => {
      if (!cancelled) {
        setStandbyDates(dates);
        if (dates.length > 0 && !dates.includes(standbyDate)) setStandbyDate(dates[0]);
      }
    });
    return () => { cancelled = true; };
  }, [subTab, refreshKey]);

  // --- 待機分析: 待機期間検出 + 逆ジオコーディング ---
  useEffect(() => {
    if (subTab !== 'standby' || !standbyDate || !window.GpsLogService) return;
    let cancelled = false;
    setLoading(true);
    setStandbyPeriods([]);
    setStandbyNames({});
    GpsLogService.getStandbyPeriods(standbyDate).then(async periods => {
      if (cancelled) return;
      setStandbyPeriods(periods);
      setLoading(false);
      // 逆ジオコーディング（500ms間隔でレート制限）
      if (window.TaxiApp && TaxiApp.utils.reverseGeocode) {
        const names = {};
        for (let i = 0; i < periods.length; i++) {
          if (cancelled) break;
          try {
            const name = await TaxiApp.utils.reverseGeocode(periods[i].lat, periods[i].lng);
            names[i] = name;
            if (!cancelled) setStandbyNames(prev => ({ ...prev, [i]: name }));
          } catch {}
          if (i < periods.length - 1) await new Promise(r => setTimeout(r, 500));
        }
      }
    });
    return () => { cancelled = true; };
  }, [standbyDate, subTab]);

  // --- 待機分析: 地図初期化 ---
  useEffect(() => {
    if (subTab !== 'standby' || !standbyMapRef.current || !mapsLoaded || !window.google) return;
    if (standbyMapInstanceRef.current) return;
    standbyMapInstanceRef.current = new google.maps.Map(standbyMapRef.current, {
      center: { lat: 43.77, lng: 142.365 },
      zoom: 13,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: false,
      styles: [{ elementType: 'geometry', stylers: [{ color: '#1d2c4d' }] },
        { elementType: 'labels.text.fill', stylers: [{ color: '#8ec3b9' }] },
        { elementType: 'labels.text.stroke', stylers: [{ color: '#1a3646' }] },
        { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#304a7d' }] },
        { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0e1626' }] }],
    });
    standbyInfoWindowRef.current = new google.maps.InfoWindow();
  }, [subTab, mapsLoaded]);

  // --- 待機分析: マーカー更新 ---
  useEffect(() => {
    if (!standbyMapInstanceRef.current) return;
    const map = standbyMapInstanceRef.current;
    // 既存マーカークリア
    standbyMarkersRef.current.forEach(m => m.setMap(null));
    standbyMarkersRef.current = [];
    if (standbyInfoWindowRef.current) standbyInfoWindowRef.current.close();

    if (standbyPeriods.length === 0) return;

    const bounds = new google.maps.LatLngBounds();
    standbyPeriods.forEach((p, idx) => {
      const pos = { lat: p.lat, lng: p.lng };
      bounds.extend(pos);
      const scale = Math.min(6 + p.durationMin * 0.5, 20); // 待機時間に応じたサイズ
      const marker = new google.maps.Marker({
        position: pos, map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: '#ff9800',
          fillOpacity: 0.8,
          strokeColor: '#fff',
          strokeWeight: 1.5,
          scale,
        },
        zIndex: 30,
      });
      marker.addListener('click', () => {
        const name = standbyNames[idx] || '取得中...';
        const start = new Date(p.startTime).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
        const end = new Date(p.endTime).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
        standbyInfoWindowRef.current.setContent(
          `<div style="color:#333;font-size:13px;line-height:1.6;min-width:140px"><b>${name}</b><br>${start} 〜 ${end}<br><b>${p.durationMin}分</b>待機</div>`
        );
        standbyInfoWindowRef.current.open(map, marker);
      });
      standbyMarkersRef.current.push(marker);
    });
    map.fitBounds(bounds, 40);
  }, [standbyPeriods, standbyNames]);

  // --- 待機分析: クリーンアップ ---
  useEffect(() => {
    return () => {
      standbyMarkersRef.current.forEach(m => m.setMap(null));
      standbyMarkersRef.current = [];
      if (standbyInfoWindowRef.current) standbyInfoWindowRef.current.close();
    };
  }, []);

  const subTabs = [
    { id: 'trend', label: '走行トレンド', icon: 'trending_up' },
    { id: 'matrix', label: 'エリア分析', icon: 'grid_on' },
    { id: 'playback', label: '軌跡プレイバック', icon: 'play_circle' },
    { id: 'standby', label: '待機分析', icon: 'hourglass_top' },
  ];

  // --- レンダリング ---
  return React.createElement(React.Fragment, null,
    // サブタブ
    React.createElement('div', { style: { display: 'flex', gap: '4px', marginBottom: '16px', background: 'rgba(255,255,255,0.04)', borderRadius: '10px', padding: '4px' } },
      ...subTabs.map(st => React.createElement('button', {
        key: st.id,
        onClick: () => setSubTab(st.id),
        style: {
          flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '4px',
          padding: '8px 4px', borderRadius: '8px', border: 'none',
          fontSize: '12px', fontWeight: subTab === st.id ? 700 : 500, cursor: 'pointer',
          background: subTab === st.id ? 'var(--color-accent)' : 'transparent',
          color: subTab === st.id ? '#fff' : 'var(--text-secondary)',
          transition: 'all 0.2s',
        },
      },
        React.createElement('span', { className: 'material-icons-round', style: { fontSize: '16px' } }, st.icon),
        st.label
      ))
    ),

    // ローディング
    loading && React.createElement('div', { style: { textAlign: 'center', padding: '40px', color: 'var(--text-secondary)' } }, '分析中...'),

    // === 走行トレンド ===
    !loading && subTab === 'trend' && (() => {
      if (trends.length === 0) {
        return React.createElement('div', { style: { textAlign: 'center', padding: '40px 20px', color: 'var(--text-secondary)' } },
          React.createElement('span', { className: 'material-icons-round', style: { fontSize: '48px', display: 'block', marginBottom: '12px', opacity: 0.4 } }, 'show_chart'),
          'GPSデータがありません'
        );
      }
      const maxDist = Math.max(...trends.map(t => t.distanceKm), 1);
      return React.createElement(React.Fragment, null,
        // サマリーカード（全日合計）
        React.createElement(Card, { style: { marginBottom: '12px' } },
          React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '8px', textAlign: 'center' } },
            ...[
              { label: '記録日数', value: trends.length + '日', color: 'var(--text-primary)' },
              { label: '総走行距離', value: trends.reduce((s, t) => s + t.distanceKm, 0).toFixed(1) + ' km', color: 'var(--color-accent)' },
              { label: '平均速度', value: (trends.reduce((s, t) => s + t.avgSpeed, 0) / trends.length).toFixed(1) + ' km/h', color: 'var(--text-primary)' },
            ].map((item, i) => React.createElement('div', { key: i },
              React.createElement('div', { style: { fontSize: '11px', color: 'var(--text-secondary)', marginBottom: '2px' } }, item.label),
              React.createElement('div', { style: { fontSize: '16px', fontWeight: 600, color: item.color } }, item.value)
            ))
          )
        ),
        // 日別バーチャート
        React.createElement('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '8px' } }, '日別走行距離'),
        React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '4px' } },
          ...trends.slice(0, 30).map(t => React.createElement('div', { key: t.date, style: { display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px' } },
            React.createElement('span', { style: { width: '78px', flexShrink: 0, color: 'var(--text-secondary)' } }, t.date),
            React.createElement('div', { style: { flex: 1, height: '16px', background: 'rgba(255,255,255,0.06)', borderRadius: '4px', overflow: 'hidden', position: 'relative' } },
              React.createElement('div', { style: {
                height: '100%', borderRadius: '4px', transition: 'width 0.3s',
                width: `${Math.max((t.distanceKm / maxDist) * 100, 1)}%`,
                background: t.distanceKm > 50 ? 'var(--color-accent)' : t.distanceKm > 20 ? '#2196F3' : 'rgba(255,255,255,0.2)',

  const [regeoProgress, setRegeoProgress] = useState('');

  // 座標から住所を一括再取得
  const handleRegeocode = useCallback(async () => {
    const targets = revenueEntries.filter(e =>
      (e.pickupCoords && e.pickupCoords.lat && e.pickupCoords.lng) ||
      (e.dropoffCoords && e.dropoffCoords.lat && e.dropoffCoords.lng)
    );
    if (targets.length === 0) {
      alert('座標データを持つ記録がありません。');
      return;
    }
    if (!confirm(`${targets.length}件の記録の住所を座標から再取得します。よろしいですか？`)) return;

    setRegeocoding(true);
    let updated = 0;
    const geocoder = window.google && window.google.maps && window.google.maps.Geocoder ? new window.google.maps.Geocoder() : null;

    for (let i = 0; i < targets.length; i++) {
      const entry = targets[i];
      setRegeoProgress(`${i + 1}/${targets.length}件処理中...`);
      const updates = {};

      try {
        // 乗車地
        if (entry.pickupCoords && entry.pickupCoords.lat && entry.pickupCoords.lng) {
          const addr = await reverseGeocode(geocoder, entry.pickupCoords.lat, entry.pickupCoords.lng);
          if (addr) updates.pickup = addr;
        }
        // 降車地
        if (entry.dropoffCoords && entry.dropoffCoords.lat && entry.dropoffCoords.lng) {
          const addr = await reverseGeocode(geocoder, entry.dropoffCoords.lat, entry.dropoffCoords.lng);
          if (addr) updates.dropoff = addr;
        }

        if (Object.keys(updates).length > 0) {
          DataService.updateEntry(entry.id, updates);
          updated++;
        }
      } catch (err) {
        AppLogger.warn(`住所再取得エラー (id=${entry.id}): ${err.message}`);
      }

      // Nominatimレート制限対策（500ms間隔）
      if (i < targets.length - 1) {
        await new Promise(r => setTimeout(r, 500));
      }
    }

    setRegeocoding(false);

          });
        });
        const preferred = results.find(r => r.types.includes('premise') || r.types.includes('street_address')) || results[0];
        return TaxiApp.utils.extractAddress(preferred);
      } catch {

    const res = await fetch(TaxiApp.utils.nominatimUrl(lat, lng, 18));

      const parts = [a.city || a.town || a.village || a.county || '', a.suburb || a.neighbourhood || a.quarter || '', a.road || ''].filter(Boolean);

(function() {
// Logs.jsx - ログビューアページ
window.LogsPage = () => {
  const { useState, useMemo } = React;
  const { logs, clearLogs } = useLogContext();
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const filteredLogs = useMemo(() => {
    let result = [...logs].reverse();
    if (filter !== 'all') {
      result = result.filter(log => log.level === filter);
    }
    if (search) {
      const s = search.toLowerCase();
      result = result.filter(log => log.message.toLowerCase().includes(s));
    }
    return result;
  }, [logs, filter, search]);

  const counts = useMemo(() => ({
    all: logs.length,
    info: logs.filter(l => l.level === 'info').length,
    warn: logs.filter(l => l.level === 'warn').length,
    error: logs.filter(l => l.level === 'error').length,
    debug: logs.filter(l => l.level === 'debug').length,
  }), [logs]);

  const formatTime = (ts) => {
    const d = new Date(ts);
    return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  };

  return React.createElement('div', null,
    React.createElement('h1', { className: 'page-title' },
      React.createElement('span', { className: 'material-icons-round' }, 'terminal'),
      'ログビューア'
    ),

    // フィルター
    React.createElement('div', {
      style: { display: 'flex', gap: '8px', marginBottom: 'var(--space-md)', flexWrap: 'wrap', alignItems: 'center' },
    },
      ['all', 'info', 'warn', 'error', 'debug'].map(level =>
        React.createElement('button', {
          key: level,
          className: `tab ${filter === level ? 'active' : ''}`,
          onClick: () => setFilter(level),
          style: { border: 'none', background: filter === level ? 'rgba(26,115,232,0.15)' : 'rgba(255,255,255,0.04)', borderRadius: '20px', padding: '4px 12px' },
        },
          `${level === 'all' ? '全て' : level.toUpperCase()} (${counts[level]})`
        )
      ),

      React.createElement('input', {
        className: 'form-input',
        type: 'text',
        placeholder: '検索...',
        value: search,
        onChange: (e) => setSearch(e.target.value),
        style: { maxWidth: '200px', padding: '4px 12px', marginLeft: 'auto' },
      }),

      React.createElement(Button, {
        variant: 'danger',
        icon: 'delete',
        onClick: clearLogs,
        style: { padding: '4px 12px', fontSize: '12px' },
      }, 'クリア')

            style: { padding: 'var(--space-2xl)', textAlign: 'center', color: 'var(--text-muted)' },
          }, 'ログはありません')

            React.createElement('div', { key: log.id, className: 'dev-log-entry' },
              React.createElement('span', { className: 'dev-log-entry__time' }, formatTime(log.timestamp)),
              React.createElement('span', { className: `dev-log-entry__level dev-log-entry__level--${log.level}` },
                log.level.toUpperCase()
              ),
              React.createElement('span', { className: 'dev-log-entry__message' }, log.message)

window.GatheringMemoPage = () => {
  const { useState, useEffect, useCallback, useRef, useMemo } = React;

  const todayDefault = getLocalDateString();
  const getNowTime = TaxiApp.utils.getNowTime;

  // ============================================================
  // 定数
  // ============================================================
  const DENSITY_OPTIONS = [
    { value: 'many', label: '多い', color: '#4caf50', bg: 'rgba(76,175,80,0.15)' },
    { value: 'normal', label: '普通', color: '#f9a825', bg: 'rgba(249,168,37,0.15)' },
    { value: 'few', label: '少ない', color: '#ff9800', bg: 'rgba(255,152,0,0.15)' },
    { value: 'none', label: 'いない', color: '#e53935', bg: 'rgba(229,57,53,0.15)' },
  ];

  const LOCATION_TYPE_OPTIONS = [
    { value: 'station', label: '駅' },
    { value: 'hospital', label: '病院' },
    { value: 'commercial', label: '商業施設' },
    { value: 'office', label: 'オフィス街' },
    { value: 'residential', label: '住宅街' },
    { value: 'event', label: 'イベント' },
    { value: 'other', label: 'その他' },
  ];

  const WEATHER_OPTIONS = [
    { value: '晴れ', icon: '☀️' },
    { value: '曇り', icon: '☁️' },
    { value: '雨', icon: '🌧️' },
    { value: '雪', icon: '❄️' },
  ];

  const wmoToWeather = (code) => {
    if (code === undefined || code === null) return '';
    if (code <= 1) return '晴れ';
    if (code <= 3 || code === 45 || code === 48) return '曇り';
    if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code === 95 || code === 96 || code === 99) return '雨';
    if ((code >= 71 && code <= 77) || code === 85 || code === 86) return '雪';
    return '曇り';
  };

  // ============================================================
  // State
  // ============================================================
  const emptyForm = { date: todayDefault, time: getNowTime(), weather: '', location: '', locationCoords: null, density: '', locationType: 'other', stayMinutes: '', memo: '', source: 'manual' };
  const [form, setForm] = useState({ ...emptyForm });
  const [errors, setErrors] = useState([]);
  const [saved, setSaved] = useState(false);
  const [refreshKey, setRefreshKey] = useState(0);
  const [gpsLoading, setGpsLoading] = useState(false);
  const [weatherLoading, setWeatherLoading] = useState(false);
  const weatherFetched = useRef(false);
  const locationFetched = useRef(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState(null);
  const [deleteConfirmId, setDeleteConfirmId] = useState(null);
  const [showAnalysis, setShowAnalysis] = useState(false);

  // 音声入力
  const [isListening, setIsListening] = useState(false);
  const [transcript, setTranscript] = useState('');
  const [interimTranscript, setInterimTranscript] = useState('');
  const recognitionRef = useRef(null);
  const speechSupported = useRef(!!(window.SpeechRecognition || window.webkitSpeechRecognition));

  const { apiKey } = useAppContext();

  // ============================================================
  // 天気・GPS自動取得
  // ============================================================
  useEffect(() => {
    if (weatherFetched.current) return;
    weatherFetched.current = true;
    if (!navigator.geolocation) return;
    setWeatherLoading(true);
    getAccuratePosition({ accuracyThreshold: 500, timeout: 10000, maxWaitAfterFix: 3000 })
      .then((position) => {
        const lat = position.coords.latitude.toFixed(4);
        const lng = position.coords.longitude.toFixed(4);
        const meteoParams = new URLSearchParams({ latitude: lat, longitude: lng, current_weather: 'true', timezone: 'Asia/Tokyo' });
        return fetch(`https://api.open-meteo.com/v1/forecast?${meteoParams}`).then(res => res.json());
      })
      .then(data => {
        setWeatherLoading(false);
        if (data && data.current_weather) {
          const w = wmoToWeather(data.current_weather.weathercode);
          if (w) setForm(prev => prev.weather ? prev : { ...prev, weather: w });
        }
      })
      .catch(() => setWeatherLoading(false));
  }, []);

  useEffect(() => {
    if (locationFetched.current) return;
    locationFetched.current = true;
    if (!navigator.geolocation) return;
    setGpsLoading(true);
    getAccuratePosition({ accuracyThreshold: 200, timeout: 15000, maxWaitAfterFix: 5000 })
      .then((position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        setForm(prev => ({ ...prev, locationCoords: { lat, lng } }));
        setGpsLoading(false);
      })
      .catch(() => setGpsLoading(false));
  }, []);

  // ============================================================
  // データ変更リスナー
  // ============================================================
  useEffect(() => {
    const handleStorage = (e) => {
      if (e.key === APP_CONSTANTS.STORAGE_KEYS.GATHERING_MEMOS) setRefreshKey(k => k + 1);
    };
    window.addEventListener('storage', handleStorage);
    const handleVisibility = () => { if (!document.hidden) setRefreshKey(k => k + 1); };
    document.addEventListener('visibilitychange', handleVisibility);
    const handleDataChanged = () => setRefreshKey(k => k + 1);
    window.addEventListener('taxi-data-changed', handleDataChanged);
    return () => {
      window.removeEventListener('storage', handleStorage);
      document.removeEventListener('visibilitychange', handleVisibility);
      window.removeEventListener('taxi-data-changed', handleDataChanged);
    };
  }, []);

  const entries = useMemo(() => DataService.getGatheringMemos(), [refreshKey]);
  const analysis = useMemo(() => showAnalysis ? DataService.getGatheringAnalysis() : null, [refreshKey, showAnalysis]);

  // ============================================================
  // 音声入力
  // ============================================================
  const KNOWN_LOCATIONS_LIST = useMemo(() => {
    const locs = [];
    const kl = APP_CONSTANTS.KNOWN_LOCATIONS;
    if (kl && kl.asahikawa) {
      if (kl.asahikawa.station) locs.push(kl.asahikawa.station.name);
      if (kl.asahikawa.hospitals) kl.asahikawa.hospitals.forEach(h => locs.push(h.name));
      if (kl.asahikawa.hotels) kl.asahikawa.hotels.forEach(h => locs.push(h.name));
    }
    return locs;
  }, []);

  const parseVoiceInput = useCallback((text) => {
    if (!text) return {};
    const result = {};

    // 全角→半角数字変換
    const normalized = text.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));

    // 場所抽出: 既知の場所名マッチング
    for (const loc of KNOWN_LOCATIONS_LIST) {
      if (normalized.includes(loc)) { result.location = loc; break; }
    }
    // 場所タイプ推定
    if (/駅/.test(normalized)) result.locationType = 'station';
    else if (/病院|医大|クリニック/.test(normalized)) result.locationType = 'hospital';
    else if (/モール|イオン|商業|ショッピング|デパート/.test(normalized)) result.locationType = 'commercial';
    else if (/オフィス|ビル街/.test(normalized)) result.locationType = 'office';
    else if (/住宅|マンション/.test(normalized)) result.locationType = 'residential';
    else if (/イベント|祭り|ライブ|コンサート/.test(normalized)) result.locationType = 'event';

    // 密度抽出
    if (/多い|たくさん|いっぱい|混んで|混雑/.test(normalized)) result.density = 'many';
    else if (/普通|まあまあ|そこそこ/.test(normalized)) result.density = 'normal';
    else if (/少ない|あまり|ちょっと|少し/.test(normalized)) result.density = 'few';
    else if (/いない|ゼロ|全然|誰も|皆無|ガラガラ/.test(normalized)) result.density = 'none';

    // 時刻抽出: N時M分、N時半、N時
    const timeMatch = normalized.match(/(\d{1,2})時(?:(\d{1,2})分|半)?/);
    if (timeMatch) {
      const h = parseInt(timeMatch[1], 10);
      const m = timeMatch[2] ? parseInt(timeMatch[2], 10) : (normalized.includes('半') && timeMatch[0].includes('半') ? 30 : 0);
      if (h >= 0 && h <= 23 && m >= 0 && m <= 59) {
        result.time = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      }
    }

    // 滞在時間抽出: N分待った、N分滞在、N時間
    const stayMatch = normalized.match(/(\d{1,3})分(?:待|滞在|くらい)?/);
    if (stayMatch) result.stayMinutes = stayMatch[1];
    const stayHourMatch = normalized.match(/(\d{1,2})時間(?:待|滞在)?/);
    if (stayHourMatch && !timeMatch) result.stayMinutes = String(parseInt(stayHourMatch[1], 10) * 60);

    // 場所名が既知でなかった場合、入力テキストから場所名候補を抽出
    if (!result.location) {
      // 「〇〇駅」「〇〇病院」「〇〇前」等のパターン
      const locMatch = normalized.match(/([^\s、。,]{2,}(?:駅|病院|前|口|モール|イオン|ホテル|空港))/);
      if (locMatch) result.location = locMatch[1];
    }

    return result;

      recognition.interimResults = true;

      recognition.onresult = (event) => {
        let interim = '';
        let final = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          if (event.results[i].isFinal) final += t;
          else interim += t;
        }
        setInterimTranscript(interim);
        if (final) {
          setTranscript(prev => prev + final);
        }
      };

      recognition.onend = () => {
        setIsListening(false);
      };

      recognition.onerror = (e) => {
        setIsListening(false);
        if (e.error !== 'no-speech' && e.error !== 'aborted') {
          AppLogger.warn('音声認識エラー: ' + e.error);

      };

      setTranscript('');
      setInterimTranscript('');

  useEffect(() => {
    const tick = () => {
      const now = new Date();
      setTime(String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0'));
    };
    tick();
    const id = setInterval(tick, 10000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (!navigator.geolocation) return;

      (pos) => {
        cachedPosRef.current = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy,
          timestamp: pos.timestamp || Date.now(),
        };
      },
      () => {},
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }

  useEffect(() => {

  }, []);

    try {

      if (data && data.address) {
        const a = data.address;
        const parts = [a.city || a.town || a.village || '', a.suburb || a.neighbourhood || a.quarter || '', a.road || ''].filter(Boolean);
        return parts.join(' ') || data.display_name.split(',').slice(0, 3).join(' ');

  const btnLabel = status === 'loading' ? '...' : status === 'success' ? 'OK' : status === 'error' ? '!' : '乗車';

  return React.createElement('div', { style: containerStyle },
    React.createElement('div', { style: timeStyle }, time),
    React.createElement('button', {
      style: buttonStyle,
      onClick: handlePickup,
      disabled: status === 'loading',
    }, btnLabel),
    React.createElement('div', { style: msgStyle }, message),
    lastPickup && React.createElement('div', { style: lastStyle },
      '前回: ' + (lastPickup.address || '').substring(0, 20) + ' (' +
      new Date(lastPickup.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) + ')'
    )
  );
};

})();

(function() {
// App.jsx - ルートコンポーネント（ハッシュルーティング対応）
window.App = () => {
  const { currentPage, navigate } = useAppContext();

  // レガシー: カスタムイベントでのナビゲーション対応（後方互換性）
  React.useEffect(() => {
    const handler = (e) => navigate(e.detail);
    document.addEventListener('navigate', handler);
    return () => document.removeEventListener('navigate', handler);
  }, [navigate]);

  // ページルーティング（useMemoで不要な再生成を防止）
  const page = React.useMemo(() => {
    switch (currentPage) {
      case 'dashboard': return React.createElement(DashboardPage);
      case 'map': return React.createElement(MapViewPage);
      case 'revenue': return React.createElement(RevenuePage);
      case 'rival-ride': return React.createElement(RivalRidePage);
      case 'transit-info': return React.createElement(TransitInfoPage);
      case 'events': return React.createElement(EventsPage);
      case 'analytics': return React.createElement(AnalyticsPage);
      case 'gathering-memo': return React.createElement(GatheringMemoPage);
      case 'calendar': return React.createElement(CalendarPage);
      case 'info': return React.createElement(InfoPage);
      case 'data-manage': return React.createElement(DataManagePage);
      case 'settings': return React.createElement(SettingsPage);
      case 'dev': return React.createElement(DevToolsPage);
      case 'dev-logs': return React.createElement(LogsPage);
      case 'dev-structure': return React.createElement(StructurePage);
      case 'dev-api': return React.createElement(ApiStatusPage);
      default: return React.createElement(DashboardPage);
    }
  }, [currentPage]);

  return React.createElement(Layout, null, page);
};

})();

  <!-- Service Worker登録 & PWAインストールプロンプト -->
  <script>
  // Service Worker登録
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(() => {
          if (window.AppLogger) AppLogger.info('Service Worker登録完了');
        })
        .catch(() => {});
    });
  }

  // PWAインストールプロンプト
  window._pwaInstallPrompt = null;
  window._pwaInstalled = false;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window._pwaInstallPrompt = e;
    // カスタムイベントで通知
    document.dispatchEvent(new CustomEvent('pwa-install-available'));
  });

  window.addEventListener('appinstalled', () => {
    window._pwaInstalled = true;
    window._pwaInstallPrompt = null;
    if (window.AppLogger) AppLogger.info('PWAインストール完了');
    document.dispatchEvent(new CustomEvent('pwa-installed'));
  });

  // インストール実行関数
  window.triggerPwaInstall = async () => {
    if (!window._pwaInstallPrompt) return { success: false, reason: 'prompt_not_available' };
    try {
      window._pwaInstallPrompt.prompt();
      const result = await window._pwaInstallPrompt.userChoice;
      window._pwaInstallPrompt = null;
      return { success: result.outcome === 'accepted', reason: result.outcome };
    } catch (e) {
      return { success: false, reason: e.message };
    }
  };
  </script>
