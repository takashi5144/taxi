<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <title>乗車GPS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1117;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #btn {
      width: 150px; height: 150px;
      border-radius: 50%;
      border: 3px solid rgba(26,115,232,0.5);
      background: radial-gradient(circle at 35% 35%, #1a73e8, #0d47a1);
      color: #fff;
      font-size: 28px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 25px rgba(26,115,232,0.3);
      transition: all 0.15s;
      outline: none;
    }
    #btn:active { transform: scale(0.93); }
    #btn.loading {
      background: radial-gradient(circle at 35% 35%, #f9a825, #e65100);
      border-color: rgba(249,168,37,0.5);
      box-shadow: 0 0 25px rgba(249,168,37,0.3);
      font-size: 18px;
    }
    #btn.ok {
      background: radial-gradient(circle at 35% 35%, #00c853, #2e7d32);
      border-color: rgba(0,200,83,0.5);
      box-shadow: 0 0 25px rgba(0,200,83,0.3);
      font-size: 22px;
    }
    #btn.ng {
      background: radial-gradient(circle at 35% 35%, #ff1744, #b71c1c);
      border-color: rgba(255,23,68,0.5);
      box-shadow: 0 0 25px rgba(255,23,68,0.3);
      font-size: 16px;
    }
    #msg {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      max-width: 180px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <button id="btn" onclick="go()">乗車</button>
  <div id="msg"></div>
  <script>
    var uid = new URLSearchParams(location.search).get('uid');
    var btn = document.getElementById('btn');
    var msg = document.getElementById('msg');
    var busy = false;

    if (!uid) {
      msg.textContent = 'スマホの設定画面からウォッチ用URLを取得してください';
      btn.disabled = true;
      btn.style.opacity = '0.4';
    }

    function go() {
      if (busy || !uid) return;
      busy = true;
      btn.className = 'loading';
      btn.textContent = '取得中...';
      msg.textContent = '';

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          var lat = pos.coords.latitude;
          var lng = pos.coords.longitude;
          var acc = Math.round(pos.coords.accuracy);
          msg.textContent = '送信中...';

          fetch('/api/gps?uid=' + encodeURIComponent(uid), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ lat: lat, lng: lng, accuracy: acc, timestamp: Date.now() })
          }).then(function(r) {
            if (!r.ok) throw new Error('送信失敗');
            btn.className = 'ok';
            btn.textContent = '完了';
            msg.textContent = '精度: ' + acc + 'm';
            if (navigator.vibrate) navigator.vibrate(200);
            setTimeout(reset, 3000);
          }).catch(function(e) {
            btn.className = 'ng';
            btn.textContent = '送信失敗';
            msg.textContent = e.message || 'エラー';
            setTimeout(reset, 3000);
          });
        },
        function(e) {
          btn.className = 'ng';
          btn.textContent = 'エラー';
          msg.textContent = e.code === 1 ? '位置情報を許可してください'
            : e.code === 3 ? 'タイムアウト' : 'GPS取得失敗';
          if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
          setTimeout(reset, 3000);
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    function reset() {
      btn.className = '';
      btn.textContent = '乗車';
      msg.textContent = '';
      busy = false;
    }
  </script>
</body>
</html>
